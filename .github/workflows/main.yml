name: Bump version on PR

on:
  push:
    branches: [master]

permissions:
  contents: write 
  
jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Ensure on master branch
        run: |
          git checkout master
          git pull origin master

      - name: Set up Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version (PowerShell)
        shell: pwsh
        run: |
          # run bump script, default minor bump
          .\bump-version.ps1


      - name: Commit version bump
        shell: pwsh
        run: |
          if (git diff --quiet) {
            Write-Host "No version changes detected."
            exit 0
          }
          git add package.json
          git commit -m "ci: bump version" || Write-Host "nothing to commit"
          git push
